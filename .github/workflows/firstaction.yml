name: Java CI & Docker Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      # Der Build-Befehl erzeugt das JAR in build/libs/
      run: ./gradlew build

    - name: Build Docker Image
      # Dieser Schritt nutzt dein vorhandenes Dockerfile
      run: docker build -t vehicles-app:latest .

    - name: Check Docker Image
      run: docker images
